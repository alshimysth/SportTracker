<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Tracker Design Directions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Themes */
        :root {
            /* Theme 1: Alpine Pure (User Mockup) */
            --bg-base: #F8F9FA;
            --bg-card: #FFFFFF;
            --text-primary: #1E293B;
            --text-secondary: #64748B;
            --color-header: #1C3F60;
            --color-accent: #FF6B4A;
            --color-success: #22C55E;
            --radius-card: 1rem;
            --border-card: rgba(0,0,0,0.05);
        }
        .theme-midnight-peak {
            /* Theme 2: Midnight Peak (Refined Dark Mode based on Image) */
            --bg-base: #0B111A; /* Very dark rich navy/black matching the image edges */
            --bg-card: #222E42; /* The exact lighter navy/slate from the cards in the mockup */
            --text-primary: #FFFFFF;
            --text-secondary: #8B95A5; /* Softer blueish-grey for secondary text */
            --color-header: #0B111A; /* Seamless top header matching base */
            --color-accent: #38BDF8; /* Vibrant Cyan/Light Blue for FAB and View All */
            --color-success: #4ADE80; /* Neon Green */
            --radius-card: 1rem; /* Same friendly curves */
            --border-card: rgba(255,255,255,0.03); /* Barely visible, relying on color split */
        }
        
        .dynamic-bg { background-color: var(--bg-base); color: var(--text-primary); transition: all 0.3s; }
        .dynamic-card { background-color: var(--bg-card); border-radius: var(--radius-card); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); border: 1px solid var(--border-card); transition: all 0.3s; }
        .dynamic-header { background-color: var(--color-header); color: white; border-bottom-left-radius: 2rem; border-bottom-right-radius: 2rem; transition: all 0.3s; }
        .dynamic-accent { color: var(--color-accent); }
        .dynamic-bg-accent { background-color: var(--color-accent); color: white; border: none; }
        .dynamic-success { color: var(--color-success); }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden font-sans">
    
    <!-- Sidebar Controls -->
    <div class="w-80 bg-white shadow-xl p-6 flex flex-col z-10 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Design Directions</h1>
        <p class="text-sm text-gray-500 mb-8">Refined Dark Mode based on your mockup image.</p>
        
        <div class="space-y-4">
            <button onclick="setTheme('', this)" class="w-full text-left p-4 rounded-xl border-2 border-transparent bg-white hover:bg-gray-50 shadow-sm transition-all" id="btn-alpine">
                <h3 class="font-bold text-gray-900">1. Alpine Pure (Light)</h3>
                <p class="text-xs text-gray-600 mt-1">Your light mode. High contrast, coral accents.</p>
            </button>
            <button onclick="setTheme('theme-midnight-peak', this)" class="w-full text-left p-4 rounded-xl border-2 border-transparent bg-slate-900 transition-all group" id="btn-midnight">
                <h3 class="font-bold text-blue-400">2. Midnight Peak (Refined Dark)</h3>
                <p class="text-xs text-slate-400 mt-1 group-hover:text-slate-300">Perfectly matches your dark mode mockup. Elegant lighter `#222E42` cards on `#0B111A` background with cyan accents.</p>
            </button>
        </div>
    </div>

    <!-- Preview Area -->
    <div class="flex-1 flex items-center justify-center bg-gray-200 p-8 overflow-y-auto">
        <!-- Mobile Device Mockup -->
        <div id="appRoot" class="theme-midnight-peak dynamic-bg w-[375px] h-[812px] rounded-[3rem] overflow-hidden shadow-2xl relative border-8 border-gray-800 pt-6">
            
            <!-- Content Body -->
            <div class="px-6 space-y-8 mt-12 text-white">
                <!-- Weekly Overview -->
                <div>
                    <h3 class="text-xl font-bold mb-4 tracking-tight" style="color: var(--text-primary)">Weekly Overview</h3>
                    <div class="flex space-x-4">
                        <div class="dynamic-card p-4 flex-1 pt-5 pb-5">
                            <p class="text-sm mb-1 font-medium" style="color: var(--text-secondary)">Running</p>
                            <p class="text-2xl font-bold font-mono tracking-tight" style="color: var(--text-primary)">32.4 <span class="text-sm font-sans font-normal" style="color: var(--text-secondary)">km</span></p>
                        </div>
                        <div class="dynamic-card p-4 flex-1 pt-5 pb-5">
                            <p class="text-sm mb-1 font-medium" style="color: var(--text-secondary)">Climbing</p>
                            <p class="text-2xl font-bold font-mono tracking-tight" style="color: var(--text-primary)">14 <span class="text-sm font-sans font-normal" style="color: var(--text-secondary)">routes</span></p>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold tracking-tight" style="color: var(--text-primary)">Recent Activity</h3>
                        <a href="#" class="text-sm font-bold dynamic-accent tracking-wide">View All</a>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="dynamic-card p-4 flex items-center justify-between pt-5 pb-5">
                            <div>
                                <h4 class="font-bold text-base" style="color: var(--text-primary)">Morning Run</h4>
                                <p class="text-sm mt-1" style="color: var(--text-secondary)">Today, 7:30 AM</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold font-mono text-base" style="color: var(--text-primary)">5.2 km</p>
                                <p class="text-sm mt-1" style="color: var(--text-secondary)">28:45</p>
                            </div>
                        </div>

                        <!-- Success Card (Bouldering) -->
                        <div class="dynamic-card p-4 flex items-center justify-between pt-5 pb-5 border-l-4" style="border-left-color: var(--color-success)">
                            <div>
                                <h4 class="font-bold text-base" style="color: var(--text-primary)">Bouldering Session</h4>
                                <p class="text-sm mt-1" style="color: var(--text-secondary)">Yesterday, 6:00 PM</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold font-mono text-base dynamic-success">V5 Max</p>
                                <p class="text-sm mt-1" style="color: var(--text-secondary)">2h 15m</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating Action Button -->
            <div class="absolute bottom-10 left-0 right-0 flex justify-center">
                <button class="dynamic-bg-accent w-16 h-16 rounded-full shadow-2xl flex items-center justify-center transform hover:scale-105 transition-transform text-4xl font-light leading-none pb-1">
                    +
                </button>
            </div>
            
        </div>
    </div>

    <script>
        function setTheme(themeClass, btn) {
            const root = document.getElementById('appRoot');
            root.className = `dynamic-bg w-[375px] h-[812px] rounded-[3rem] overflow-hidden shadow-2xl relative border-8 border-gray-800 pt-6 ${themeClass}`;
            
            // Highlight active button (visual feedback only)
            document.querySelectorAll('button').forEach(b => {
                b.style.borderColor = 'transparent';
            });
            if(btn) btn.style.borderColor = themeClass === '' ? '#fb923c' : '#38bdf8';
        }
        
        // Initial highlight
        document.getElementById('btn-midnight').style.borderColor = '#38bdf8';
    </script>
</body>
</html>
