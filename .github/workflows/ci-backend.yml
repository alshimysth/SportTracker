name: Backend CI

on:
  pull_request:
    branches: [main]
    # No paths filter on PRs — always run to avoid "stuck checks" after merge commits
  push:
    branches: [main]
    paths:
      - "backend-api/**"

jobs:
  test:
    name: Build & Test (Java 25 / Spring Boot)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sporttracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25 (Liberica)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "25"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and run all tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: sporttracker_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
        run: ./mvnw verify --no-transfer-progress

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend-api/target/surefire-reports/
          retention-days: 7
