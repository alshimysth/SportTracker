name: Mobile CI

on:
  pull_request:
    branches: [main]
    paths:
      - "mobile-client/**"
      - ".github/workflows/ci-mobile.yml"
  push:
    branches: [main]
    paths:
      - "mobile-client/**"

jobs:
  validate:
    name: Lint, Type Check & Test (React Native / Expo)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
